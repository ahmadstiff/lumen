[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

# Compiler diagnostic policy: never deny, just surface warnings.
deny = "never"

[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 32
depth = 32

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
atlantic = "https://atlantic.dplabs-internal.com"
pacific = "https://rpc.pharos.xyz"
