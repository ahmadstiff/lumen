<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Lumen — Agent-Native Payments on Pharos">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0920"/>
      <stop offset="55%" stop-color="#160d34"/>
      <stop offset="100%" stop-color="#23114d"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="30%" stop-color="#e9d5ff"/>
      <stop offset="65%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8b4fe"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="300" cy="320" r="360" fill="url(#halo)"/>

  <!-- logo mark -->
  <g transform="translate(150 150) scale(1.35)">
    <g stroke="#c084fc" stroke-width="7" stroke-linecap="round" opacity="0.92">
      <line x1="128" y1="12" x2="128" y2="40"/>
      <line x1="58" y1="42" x2="76" y2="60"/>
      <line x1="198" y1="42" x2="180" y2="60"/>
      <line x1="34" y1="98" x2="58" y2="106"/>
      <line x1="222" y1="98" x2="198" y2="106"/>
    </g>
    <circle cx="128" cy="98" r="48" fill="url(#orb)"/>
    <circle cx="128" cy="98" r="48" fill="none" stroke="#fdf4ff" stroke-width="2" opacity="0.6"/>
    <g fill="none" stroke="url(#link)" stroke-width="15" stroke-linecap="round">
      <rect x="64" y="170" width="86" height="46" rx="23"/>
      <rect x="106" y="170" width="86" height="46" rx="23"/>
    </g>
  </g>

  <!-- wordmark + taglines -->
  <g font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="540" y="300" fill="url(#word)" font-size="150" font-weight="800" letter-spacing="14">LUMEN</text>
    <text x="546" y="372" fill="#c4b5fd" font-size="44" font-weight="600">Agent-Native Payments on Pharos</text>
    <text x="546" y="424" fill="#8b80c0" font-size="30" font-style="italic">The light that moves money on Pharos.</text>
    <text x="546" y="496" fill="#a78bfa" font-size="27" font-weight="600" letter-spacing="1">MCP &#183; Claude Code &#183; Codex &#183; OpenClaw</text>
    <text x="546" y="538" fill="#6f6699" font-size="24" letter-spacing="1">Stateless &#183; Permit2 + Multicall3 &#183; Composable receipts &#183; Zero custom contracts</text>
  </g>
</svg>
